    :root { color-scheme: light; }

    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f5f2ed; color: #222; }
    header { position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,.95); border-bottom: 1px solid #ddd; padding: 12px 16px; text-align: center; }
    h1 { margin: 0; font-size: 22px; }
    .hint { margin-top: 4px; font-size: 13px; color: #555; }
    main { width: min(920px, 100%); margin: 0 auto; padding: 14px 10px 32px; }
    .page { margin: 0 auto 16px; background: white; box-shadow: 0 2px 12px rgba(0,0,0,.12); border-radius: 8px; overflow: hidden; }
    .page img { display: block; width: 100%; height: auto; }
    .page-number { text-align: center; font-size: 12px; color: #666; padding: 6px 0 8px; }
    .top { position: fixed; right: 14px; bottom: 14px; background: #222; color: white; text-decoration: none; border-radius: 999px; padding: 10px 13px; font-size: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.25); }
    @media (max-width: 600px) { main { padding: 8px 6px 24px; } .page { border-radius: 4px; margin-bottom: 10px; } header { padding: 10px 12px; } h1 { font-size: 19px; } }
    @media print { header, .top, .page-number { display: none; } body { background:white; } main { width:100%; padding:0; } .page { box-shadow:none; margin:0; border-radius:0; page-break-after: always; } }
  </style>

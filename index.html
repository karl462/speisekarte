<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Speisekarte</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f2ed;
      color: #222;
      font-family: Arial, Helvetica, sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,.95);
      border-bottom: 1px solid #ddd;
      padding: 12px 16px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 22px;
    }
    .hint {
      margin-top: 4px;
      font-size: 13px;
      color: #555;
    }
    main {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 14px 10px 32px;
    }
    .page {
      margin: 0 auto 16px;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      border-radius: 8px;
      overflow: hidden;
    }
    .page img {
      display: block;
      width: 100%;
      height: auto;
    }
    .page-number {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 6px 0 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>Speisekarte</h1>
  <div class="hint">Zum Lesen einfach nach unten scrollen</div>
</header>

<main>
